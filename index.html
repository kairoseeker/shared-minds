<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORM / SPACE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital@1&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0e0e0e;
    --paper: #f2f0eb;
    --mid: #b0aca4;
    --accent: #0e0e0e;
    --panel: rgba(242, 240, 235, 0.92);
    --border: rgba(14,14,14,0.15);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--ink);
    overflow: hidden;
    font-family: 'Space Mono', monospace;
    color: var(--ink);
  }

  #canvas-container {
    position: fixed;
    inset: 0;
    cursor: grab;
  }
  #canvas-container:active { cursor: grabbing; }
  #canvas-container canvas { display: block; width: 100% !important; height: 100% !important; }

  /* ── TOP BAR ── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 44px;
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 100;
    user-select: none;
  }
  #topbar .wordmark {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 17px;
    letter-spacing: 0.02em;
    color: var(--ink);
  }
  #topbar .hint {
    font-size: 9px;
    color: var(--mid);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── LEFT PANEL ── */
  #left-panel {
    position: fixed;
    top: 44px; left: 0; bottom: 0;
    width: 180px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 90;
    overflow-y: auto;
  }

  .panel-section {
    padding: 14px 14px 10px;
    border-bottom: 1px solid var(--border);
  }
  .panel-label {
    font-size: 8px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 10px;
  }

  /* Shape buttons */
  .shape-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .shape-btn {
    background: transparent;
    border: 1px solid var(--border);
    padding: 8px 4px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    color: var(--ink);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: background 0.12s, border-color 0.12s;
  }
  .shape-btn:hover { background: var(--ink); color: var(--paper); }
  .shape-btn svg { width: 22px; height: 22px; }

  /* Color swatches */
  .swatch-row {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .swatch {
    width: 22px; height: 22px;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .swatch:hover { transform: scale(1.15); }
  .swatch.active { border-color: var(--ink); }

  /* Slider controls */
  .ctrl-row {
    margin-bottom: 10px;
  }
  .ctrl-row label {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    letter-spacing: 0.05em;
    color: var(--mid);
    margin-bottom: 4px;
  }
  .ctrl-row label span { color: var(--ink); }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    background: var(--ink);
    border-radius: 50%;
    cursor: pointer;
  }

  /* Wire toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 9px;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
    color: var(--ink);
  }
  .toggle {
    position: relative;
    width: 30px; height: 16px;
    cursor: pointer;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--border);
    border: 1px solid var(--border);
    transition: background 0.2s;
  }
  .toggle input:checked + .toggle-track { background: var(--ink); }
  .toggle-thumb {
    position: absolute;
    top: 2px; left: 2px;
    width: 10px; height: 10px;
    background: var(--paper);
    transition: transform 0.2s;
    pointer-events: none;
  }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(14px); }

  /* Object list */
  #object-list { padding: 14px; flex: 1; overflow-y: auto; }
  #object-list .obj-item {
    font-size: 9px;
    letter-spacing: 0.05em;
    padding: 6px 8px;
    border: 1px solid transparent;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
    transition: border-color 0.1s;
  }
  #object-list .obj-item:hover { border-color: var(--border); }
  #object-list .obj-item.selected { border-color: var(--ink); background: rgba(14,14,14,0.06); }
  #object-list .obj-del {
    font-size: 11px;
    color: var(--mid);
    cursor: pointer;
    line-height: 1;
    background: none;
    border: none;
    font-family: inherit;
    padding: 0 2px;
  }
  #object-list .obj-del:hover { color: var(--ink); }

  /* ── BOTTOM BAR ── */
  #bottom-bar {
    position: fixed;
    bottom: 0; left: 180px; right: 0;
    height: 44px;
    background: var(--paper);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
    z-index: 90;
  }
  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--border);
    padding: 7px 14px;
    cursor: pointer;
    color: var(--ink);
    transition: background 0.12s, color 0.12s;
  }
  .btn:hover { background: var(--ink); color: var(--paper); }
  .btn.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .btn.primary:hover { background: var(--paper); color: var(--ink); }
  .btn.danger { color: #c0392b; border-color: rgba(192,57,43,0.3); }
  .btn.danger:hover { background: #c0392b; color: var(--paper); }

  #status {
    margin-left: auto;
    font-size: 9px;
    letter-spacing: 0.06em;
    color: var(--mid);
  }

  /* ── SELECTED OBJECT PANEL (right) ── */
  #right-panel {
    position: fixed;
    top: 44px; right: 0; bottom: 44px;
    width: 170px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    z-index: 90;
    padding: 14px;
    display: none;
    overflow-y: auto;
  }
  #right-panel.visible { display: block; }
  #right-panel .panel-label { margin-bottom: 12px; }

  /* Screenshot flash */
  #flash {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.05s;
  }
</style>
</head>
<body>

<div id="canvas-container"></div>
<div id="flash"></div>

<!-- TOP BAR -->
<div id="topbar">
  <div class="wordmark">form / space</div>
  <div class="hint">orbit: drag &nbsp;·&nbsp; zoom: scroll &nbsp;·&nbsp; select: click object</div>
</div>

<!-- LEFT PANEL -->
<div id="left-panel">
  <div class="panel-section">
    <div class="panel-label">Add Shape</div>
    <div class="shape-grid">
      <button class="shape-btn" onclick="addShape('box')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="7" width="14" height="14"/><polyline points="3,7 10,2 21,2 21,16 14,21"/><line x1="21" y1="2" x2="14" y2="7"/></svg>
        BOX
      </button>
      <button class="shape-btn" onclick="addShape('sphere')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><ellipse cx="12" cy="12" rx="9" ry="4"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
        SPHERE
      </button>
      <button class="shape-btn" onclick="addShape('cylinder')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="6" rx="8" ry="3"/><ellipse cx="12" cy="18" rx="8" ry="3"/><line x1="4" y1="6" x2="4" y2="18"/><line x1="20" y1="6" x2="20" y2="18"/></svg>
        CYL
      </button>
      <button class="shape-btn" onclick="addShape('cone')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="18" rx="8" ry="3"/><line x1="4" y1="18" x2="12" y2="4"/><line x1="20" y1="18" x2="12" y2="4"/></svg>
        CONE
      </button>
      <button class="shape-btn" onclick="addShape('torus')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="12" rx="9" ry="4"/><ellipse cx="12" cy="12" rx="4" ry="2"/></svg>
        TORUS
      </button>
      <button class="shape-btn" onclick="addShape('plane')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="3,18 9,6 21,6 15,18"/></svg>
        PLANE
      </button>
    </div>
  </div>

  <div class="panel-section">
    <div class="panel-label">Material</div>
    <div class="swatch-row" id="swatches"></div>
  </div>

  <div class="panel-section">
    <div class="panel-label">Viewport</div>
    <div class="toggle-row">
      WIREFRAME
      <label class="toggle">
        <input type="checkbox" id="wire-toggle" onchange="toggleWireframe(this.checked)">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="toggle-row">
      GRID
      <label class="toggle">
        <input type="checkbox" id="grid-toggle" checked onchange="toggleGrid(this.checked)">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="ctrl-row">
      <label>BG GRAY <span id="bg-val">0</span></label>
      <input type="range" min="0" max="100" value="0" oninput="setBg(this.value)" />
    </div>
  </div>

  <div class="panel-section">
    <div class="panel-label">Objects</div>
  </div>
  <div id="object-list"></div>
</div>

<!-- RIGHT PANEL (selected object) -->
<div id="right-panel">
  <div class="panel-label">Selected</div>
  <div class="ctrl-row">
    <label>POS X <span id="px-val">0</span></label>
    <input type="range" min="-8" max="8" step="0.1" value="0" id="px" oninput="moveSelected('x', this.value)"/>
  </div>
  <div class="ctrl-row">
    <label>POS Y <span id="py-val">0</span></label>
    <input type="range" min="-4" max="8" step="0.1" value="0" id="py" oninput="moveSelected('y', this.value)"/>
  </div>
  <div class="ctrl-row">
    <label>POS Z <span id="pz-val">0</span></label>
    <input type="range" min="-8" max="8" step="0.1" value="0" id="pz" oninput="moveSelected('z', this.value)"/>
  </div>
  <div class="ctrl-row">
    <label>ROT X <span id="rx-val">0</span></label>
    <input type="range" min="-180" max="180" step="1" value="0" id="rx" oninput="rotateSelected('x', this.value)"/>
  </div>
  <div class="ctrl-row">
    <label>ROT Y <span id="ry-val">0</span></label>
    <input type="range" min="-180" max="180" step="1" value="0" id="ry" oninput="rotateSelected('y', this.value)"/>
  </div>
  <div class="ctrl-row">
    <label>ROT Z <span id="rz-val">0</span></label>
    <input type="range" min="-180" max="180" step="1" value="0" id="rz" oninput="rotateSelected('z', this.value)"/>
  </div>
  <div class="ctrl-row">
    <label>SCALE <span id="sc-val">1</span></label>
    <input type="range" min="0.1" max="4" step="0.05" value="1" id="sc" oninput="scaleSelected(this.value)"/>
  </div>
  <div style="margin-top:8px">
    <button class="btn danger" style="width:100%;text-align:center" onclick="deleteSelected()">DELETE</button>
  </div>
</div>

<!-- BOTTOM BAR -->
<div id="bottom-bar">
  <button class="btn" onclick="resetCamera()">RESET VIEW</button>
  <button class="btn" onclick="clearAll()">CLEAR ALL</button>
  <button class="btn primary" onclick="takeScreenshot()">⬡ SCREENSHOT</button>
  <div id="status">NO SELECTION</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── SCENE SETUP ───────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const W = () => container.clientWidth;
const H = () => container.clientHeight;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e0e0e);
scene.fog = new THREE.FogExp2(0x0e0e0e, 0.04);

const camera = new THREE.PerspectiveCamera(45, W()/H(), 0.1, 200);
camera.position.set(6, 4, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setSize(W(), H());
container.appendChild(renderer.domElement);

// Lighting
const ambient = new THREE.AmbientLight(0xffffff, 0.35);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xffffff, 1.1);
keyLight.position.set(8, 12, 6);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.near = 0.1;
keyLight.shadow.camera.far = 60;
keyLight.shadow.camera.left = -15;
keyLight.shadow.camera.right = 15;
keyLight.shadow.camera.top = 15;
keyLight.shadow.camera.bottom = -15;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
fillLight.position.set(-6, 4, -4);
scene.add(fillLight);

// Grid
const gridHelper = new THREE.GridHelper(20, 20, 0x333333, 0x222222);
scene.add(gridHelper);

// Shadow floor (invisible plane for shadows)
const floorGeo = new THREE.PlaneGeometry(40, 40);
const floorMat = new THREE.ShadowMaterial({ opacity: 0.3 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// ─── PALETTE ───────────────────────────────────────────────────────
const COLORS = [
  '#f2f0eb', '#d4d0c8', '#8e8a82',
  '#0e0e0e', '#2d3a2e', '#1c1c3a',
  '#3a1c1c', '#c8b89a', '#a8b4a0'
];

let activeColor = COLORS[0];
const swatchContainer = document.getElementById('swatches');
COLORS.forEach((c, i) => {
  const s = document.createElement('div');
  s.className = 'swatch' + (i === 0 ? ' active' : '');
  s.style.background = c;
  s.style.border = '1.5px solid ' + (c === '#f2f0eb' ? '#aaa' : 'transparent');
  s.onclick = () => {
    document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
    activeColor = c;
    if (selectedObj) {
      selectedObj.material.color.set(c);
      selectedObj.material.needsUpdate = true;
    }
  };
  swatchContainer.appendChild(s);
});

// ─── OBJECTS ───────────────────────────────────────────────────────
let objects = [];
let selectedObj = null;
let objCounter = 0;
let wireframeMode = false;

function makeMaterial(color) {
  return new THREE.MeshPhongMaterial({
    color: new THREE.Color(color),
    shininess: 30,
    specular: new THREE.Color(0x333333),
    wireframe: wireframeMode
  });
}

function addShape(type) {
  let geo;
  switch(type) {
    case 'box':      geo = new THREE.BoxGeometry(1.5, 1.5, 1.5); break;
    case 'sphere':   geo = new THREE.SphereGeometry(0.9, 32, 32); break;
    case 'cylinder': geo = new THREE.CylinderGeometry(0.7, 0.7, 2, 32); break;
    case 'cone':     geo = new THREE.ConeGeometry(0.9, 2, 32); break;
    case 'torus':    geo = new THREE.TorusGeometry(0.8, 0.3, 16, 64); break;
    case 'plane':    geo = new THREE.PlaneGeometry(2, 2); break;
    default:         geo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
  }
  const mat = makeMaterial(activeColor);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  // Slight random offset so shapes don't all stack
  mesh.position.set(
    (Math.random() - 0.5) * 4,
    0.8,
    (Math.random() - 0.5) * 4
  );
  mesh.userData = { id: ++objCounter, type, name: type.toUpperCase() + ' ' + objCounter };
  scene.add(mesh);
  objects.push(mesh);
  selectObject(mesh);
  refreshList();
}

function deleteSelected() {
  if (!selectedObj) return;
  scene.remove(selectedObj);
  selectedObj.geometry.dispose();
  selectedObj.material.dispose();
  objects = objects.filter(o => o !== selectedObj);
  selectedObj = null;
  document.getElementById('right-panel').classList.remove('visible');
  document.getElementById('status').textContent = 'NO SELECTION';
  refreshList();
}

function clearAll() {
  objects.forEach(o => { scene.remove(o); o.geometry.dispose(); o.material.dispose(); });
  objects = [];
  selectedObj = null;
  document.getElementById('right-panel').classList.remove('visible');
  document.getElementById('status').textContent = 'NO SELECTION';
  refreshList();
}

function selectObject(obj) {
  // Dehighlight previous
  if (selectedObj && selectedObj !== obj) {
    selectedObj.material.emissive && selectedObj.material.emissive.set(0x000000);
  }
  selectedObj = obj;
  if (!obj) {
    document.getElementById('right-panel').classList.remove('visible');
    document.getElementById('status').textContent = 'NO SELECTION';
    return;
  }
  obj.material.emissive && obj.material.emissive.set(0x111111);
  document.getElementById('right-panel').classList.add('visible');
  document.getElementById('status').textContent = obj.userData.name;
  // Sync sliders
  const set = (id, v, display) => {
    document.getElementById(id).value = v;
    document.getElementById(id + '-val').textContent = display !== undefined ? display : v;
  };
  set('px', obj.position.x.toFixed(1), obj.position.x.toFixed(1));
  set('py', obj.position.y.toFixed(1), obj.position.y.toFixed(1));
  set('pz', obj.position.z.toFixed(1), obj.position.z.toFixed(1));
  const rx = THREE.MathUtils.radToDeg(obj.rotation.x);
  const ry = THREE.MathUtils.radToDeg(obj.rotation.y);
  const rz = THREE.MathUtils.radToDeg(obj.rotation.z);
  set('rx', rx.toFixed(0), rx.toFixed(0));
  set('ry', ry.toFixed(0), ry.toFixed(0));
  set('rz', rz.toFixed(0), rz.toFixed(0));
  set('sc', obj.scale.x.toFixed(2), obj.scale.x.toFixed(2));
  refreshList();
}

function moveSelected(axis, v) {
  if (!selectedObj) return;
  selectedObj.position[axis] = parseFloat(v);
  document.getElementById('p' + axis + '-val').textContent = parseFloat(v).toFixed(1);
}
function rotateSelected(axis, v) {
  if (!selectedObj) return;
  selectedObj.rotation[axis] = THREE.MathUtils.degToRad(parseFloat(v));
  document.getElementById('r' + axis + '-val').textContent = v;
}
function scaleSelected(v) {
  if (!selectedObj) return;
  const s = parseFloat(v);
  selectedObj.scale.set(s, s, s);
  document.getElementById('sc-val').textContent = s.toFixed(2);
}

function refreshList() {
  const list = document.getElementById('object-list');
  list.innerHTML = '';
  if (objects.length === 0) {
    list.innerHTML = '<div style="font-size:9px;color:var(--mid);padding:4px;letter-spacing:.05em">— empty —</div>';
    return;
  }
  objects.forEach(obj => {
    const item = document.createElement('div');
    item.className = 'obj-item' + (obj === selectedObj ? ' selected' : '');
    item.innerHTML = `<span>${obj.userData.name}</span>
      <button class="obj-del" onclick="event.stopPropagation(); removeObj(${obj.userData.id})">✕</button>`;
    item.onclick = () => selectObject(obj);
    list.appendChild(item);
  });
}

function removeObj(id) {
  const obj = objects.find(o => o.userData.id === id);
  if (!obj) return;
  if (obj === selectedObj) selectedObj = null;
  scene.remove(obj);
  obj.geometry.dispose();
  obj.material.dispose();
  objects = objects.filter(o => o.userData.id !== id);
  if (!selectedObj) {
    document.getElementById('right-panel').classList.remove('visible');
    document.getElementById('status').textContent = 'NO SELECTION';
  }
  refreshList();
}

// ─── VIEWPORT TOGGLES ──────────────────────────────────────────────
function toggleWireframe(on) {
  wireframeMode = on;
  objects.forEach(o => { o.material.wireframe = on; });
}
function toggleGrid(on) {
  gridHelper.visible = on;
  floor.visible = on;
}
function setBg(v) {
  const gray = parseInt(v) / 100;
  const c = new THREE.Color(gray, gray, gray);
  scene.background = c;
  scene.fog.color = c;
  document.getElementById('bg-val').textContent = v;
}
function resetCamera() {
  camera.position.set(6, 4, 10);
  camera.lookAt(0, 0, 0);
  orbitTarget.set(0, 0, 0);
}

// ─── SCREENSHOT ────────────────────────────────────────────────────
function takeScreenshot() {
  // Hide UI panels temporarily
  const panels = ['#topbar','#left-panel','#right-panel','#bottom-bar'];
  panels.forEach(s => document.querySelector(s).style.opacity = '0');
  renderer.render(scene, camera);
  const dataURL = renderer.domElement.toDataURL('image/png');
  panels.forEach(s => document.querySelector(s).style.opacity = '1');

  // Flash effect
  const flash = document.getElementById('flash');
  flash.style.opacity = '1';
  setTimeout(() => { flash.style.transition = 'opacity 0.4s'; flash.style.opacity = '0'; }, 60);

  // Download
  const a = document.createElement('a');
  a.href = dataURL;
  a.download = 'composition_' + Date.now() + '.png';
  a.click();
}

// ─── ORBIT CONTROLS (manual, no import needed) ─────────────────────
let orbitTarget = new THREE.Vector3(0, 0, 0);
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: Math.atan2(camera.position.x, camera.position.z), phi: Math.acos(camera.position.y / camera.position.length()), r: camera.position.length() };

function updateCamera() {
  camera.position.x = orbitTarget.x + spherical.r * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.position.y = orbitTarget.y + spherical.r * Math.cos(spherical.phi);
  camera.position.z = orbitTarget.z + spherical.r * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.lookAt(orbitTarget);
}

container.addEventListener('mousedown', e => {
  if (e.target.tagName !== 'CANVAS') return;
  isDragging = true;
  prevMouse = { x: e.clientX, y: e.clientY };
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = (e.clientX - prevMouse.x) * 0.008;
  const dy = (e.clientY - prevMouse.y) * 0.008;
  spherical.theta -= dx;
  spherical.phi = Math.max(0.05, Math.min(Math.PI - 0.05, spherical.phi + dy));
  prevMouse = { x: e.clientX, y: e.clientY };
  updateCamera();
});
window.addEventListener('mouseup', () => { isDragging = false; });

container.addEventListener('wheel', e => {
  e.preventDefault();
  spherical.r = Math.max(2, Math.min(40, spherical.r + e.deltaY * 0.02));
  updateCamera();
}, { passive: false });

// Touch support
let lastTouchDist = null;
let lastTouch = null;
container.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: true });
container.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && isDragging) {
    const dx = (e.touches[0].clientX - lastTouch.x) * 0.008;
    const dy = (e.touches[0].clientY - lastTouch.y) * 0.008;
    spherical.theta -= dx;
    spherical.phi = Math.max(0.05, Math.min(Math.PI - 0.05, spherical.phi + dy));
    lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    updateCamera();
  }
  if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    spherical.r = Math.max(2, Math.min(40, spherical.r - (dist - lastTouchDist) * 0.04));
    lastTouchDist = dist;
    updateCamera();
  }
}, { passive: true });
container.addEventListener('touchend', () => { isDragging = false; });

// ─── CLICK TO SELECT ───────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let mouseDownPos = null;

container.addEventListener('mousedown', e => {
  if (e.target.tagName !== 'CANVAS') return;
  mouseDownPos = { x: e.clientX, y: e.clientY };
});
container.addEventListener('mouseup', e => {
  if (!mouseDownPos) return;
  const dx = Math.abs(e.clientX - mouseDownPos.x);
  const dy = Math.abs(e.clientY - mouseDownPos.y);
  if (dx < 4 && dy < 4) {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(objects);
    if (hits.length > 0) {
      selectObject(hits[0].object);
    } else {
      if (selectedObj) selectedObj.material.emissive && selectedObj.material.emissive.set(0x000000);
      selectedObj = null;
      document.getElementById('right-panel').classList.remove('visible');
      document.getElementById('status').textContent = 'NO SELECTION';
      refreshList();
    }
  }
  mouseDownPos = null;
});

// ─── RESIZE ────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
});

// ─── ANIMATE ───────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

updateCamera();
refreshList();
animate();

// Startup: add one shape to show off
addShape('box');
</script>
